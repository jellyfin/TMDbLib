name: Build and Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
    types: [ opened, synchronize, reopened ]

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true

jobs:
  format:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

    - name: Setup .NET
      uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Verify formatting
      run: dotnet format whitespace --verify-no-changes --no-restore

    - name: Verify code style
      run: dotnet format style --verify-no-changes --no-restore

  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      with:
        fetch-depth: 50
    - run: git fetch --tags

    - name: Setup .NET
      uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore

    - name: Test
      run: MOCK_MODE=Playback dotnet test --no-build --verbosity normal --filter "Category!=RequiresAccountAccess"

    - name: Pack
      if: github.ref == 'refs/heads/master'
      run: dotnet pack -c Debug -o Build

    - name: "Github packages: Nuget push"
      if: github.ref == 'refs/heads/master'
      run: dotnet nuget push --no-symbols --skip-duplicate -k ${{ secrets.GITHUB_TOKEN }} -s "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" Build/*.nupkg

    - name: "Github packages: Cleanup"
      if: github.ref == 'refs/heads/master'
      uses: stripethree/gpr-janitor@f3704c21869d8e021ba14e340ea28c879b35d1b1 # dist
      with:
        dry-run: false
        keep-versions: 25
        min-age-days: 14
        versions-to-fetch: 20
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
